<!DOCTYPE html>
<html lang="en">  
<head>
    /* /index.html 200 
    <title>Bootstrap Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.5">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>
<body>
    <div class="container">
        <h2><mark>click on the right side to move the carousel forward, and on the left side to move it backward.</mark>
        </h2>
        <div id="myCarousel" class="carousel slide" data-ride="carousel">
            <!-- Indicators -->
            <ol class="carousel-indicators">
                <li data-target="#myCarousel" data-slide-to="1"></li>
                <li data-target="#myCarousel" data-slide-to="2"></li>
                <li data-target="#myCarousel" data-slide-to="3"></li>
                <li data-target="#myCarousel" data-slide-to="4"></li>
                <li data-target="#myCarousel" data-slide-to="5"></li>
                <li data-target="#myCarousel" data-slide-to="6"></li>
                <li data-target="#myCarousel" data-slide-to="7"></li>
                <li data-target="#myCarousel" data-slide-to="8"></li>
                <li data-target="#myCarousel" data-slide-to="9"></li>
                <li data-target="#myCarousel" data-slide-to="10"></li>
                <li data-target="#myCarousel" data-slide-to="11"></li>
                <li data-target="#myCarousel" data-slide-to="12"></li>
            </ol>
            <div class="carousel-inner">
                <div class="item active">
                    <img src="1.jpeg" alt="Image 1" style="width:40%;">
                </div>
                <div class="item">
                    <img src="2.jpeg" alt="Image 2" style="width: 70%;">
                </div>
                <div class="item">
                    <img src="3.jpeg" alt="Image 3" style="width:50%;">
                </div>
                <div class="item active">
                    <img src="4.jpeg" alt="Image 4" style="width:50%;">
                </div>
                <div class="item">
                    <img src="5.jpeg" alt="Image 5" style="width:50%;">
                </div>
                <div class="item">
                    <img src="6.jpeg" alt="Image 6" style="width:50%;">
                </div>
                <div class="item active">
                    <img src="7.jpeg" alt="Image 7" style="width:50%;">
                </div>
                <div class="item">
                    <img src="8.jpeg" alt="Image 8" style="width:50%;">
                </div>
                <div class="item">
                    <img src="9.jpeg" alt="Image 9" style="width:50%;">
                </div>
                <div class="item active">
                    <img src="10.jpeg" alt="Image 10" style="width:50%;">
                </div>
                <div class="item">
                    <img src="11.jpeg" alt="Image 11" style="width:50%;">
                </div>
                <div class="item">
                    <img src="12.jpeg" alt="Image 12" style="width:50%;">
                </div>
                <div class="item active">
                    <video width="1080" height="480" controls>
                        <source src="meme.mp4" type="video/mp4">
                    </video>
                </div>
            </div>

            </video>
            <a class="left carousel-control" href="" data-slide="prev">
                <span class="glyphicon glyphicon-chevron-left"></span>
                <span class="sr-only">Previous</span>
            </a>
            <a class="right carousel-control" href="#myCarousel" data-slide="next">
                <span class="glyphicon glyphicon-chevron-right"></span>
                <span class="sr-only">Next</span>
            </a>
        </div>
    </div>
</body>

</html>
